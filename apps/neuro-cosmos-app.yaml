apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-neuro-cosmos
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SentimentalK/k3s-homelab.git
    targetRevision: master
    path: apps/neuro-cosmos
  destination:
    server: https://kubernetes.default.svc
    namespace: neuro-cosmos
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
