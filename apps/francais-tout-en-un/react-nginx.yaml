apiVersion: v1
kind: ConfigMap
metadata:
  name: react-nginx-config
  namespace: default
data:
  nginx.conf: |
    events {}

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      
      upstream auth { server auth-service:8000; }
      upstream courses { server course-service:8001; }
      upstream entitlements { server entitlement-service:8004; }

      server {
        listen 80;
        server_name french.sentimentalk.com;

        root /usr/share/nginx/html;
        index index.html;

        location / {
          try_files $uri $uri/ /index.html;
          add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location /textbook {
          alias /usr/share/nginx/textbook/assimil_french_2021.pdf;
          add_header Content-Type application/pdf;
          add_header Cache-Control "public, max-age=31536000";
          expires 1y;
        }

        location /api/user/ {
          proxy_pass http://auth;
        }
        location /api/courses/ {
          proxy_pass http://courses;
        }
        location /api/entitlements/ {
          proxy_pass http://entitlements;
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-nginx
  namespace: default
  labels:
    app: react-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react-nginx
  template:
    metadata:
      labels:
        app: react-nginx
    spec:
      containers:
        - name: react-nginx
          image: ghcr.io/sentimentalk/francais_tout_en_un/react_nginx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: textbook-volume
              mountPath: /usr/share/nginx/textbook
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: config-volume
          configMap:
            name: react-nginx-config
        - name: textbook-volume
          hostPath:
            path: /home/ubuntu/codes/francais_tout_en_un/course_service/src
            type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/arch: arm64

---
apiVersion: v1
kind: Service
metadata:
  name: react-nginx
  namespace: default
  labels:
    app: react-nginx
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: react-nginx
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: react-nginx
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: french.sentimentalk.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: react-nginx
                port:
                  number: 80
  tls:
    - hosts:
        - french.sentimentalk.com
      secretName: react-nginx-tls
