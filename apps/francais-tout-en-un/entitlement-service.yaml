apiVersion: apps/v1
kind: Deployment
metadata:
  name: entitlement-service
  namespace: default
  labels:
    app: entitlement-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: entitlement-service
  template:
    metadata:
      labels:
        app: entitlement-service
    spec:
      containers:
        - name: entitlement-service
          image: ghcr.io/sentimentalk/francais_tout_en_un/entitlement_service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_PORT
              value: "8004"
            - name: DATABASE_URL
              value: "postgresql://postgres:1@one-database:5432/onedb"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: MESSAGING_BACKEND
              value: "redis"
          ports:
            - containerPort: 8004
              name: httpport
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
      nodeSelector:
        kubernetes.io/arch: arm64

---
apiVersion: v1
kind: Service
metadata:
  name: entitlement-service
  namespace: default
  labels:
    app: entitlement-service
spec:
  ports:
    - port: 8004
      targetPort: 8004
      protocol: TCP
      name: http
  selector:
    app: entitlement-service
  type: ClusterIP
