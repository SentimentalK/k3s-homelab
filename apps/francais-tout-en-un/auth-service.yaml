apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/sentimentalk/francais_tout_en_un/auth_service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_PORT
              value: "8000"
            - name: DATABASE_URL
              value: "postgresql://postgres:1@one-database:5432/onedb"
          ports:
            - containerPort: 8000
              name: httpport
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
      nodeSelector:
        kubernetes.io/arch: arm64

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: auth-service
  type: ClusterIP
