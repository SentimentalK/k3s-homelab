apiVersion: apps/v1
kind: Deployment
metadata:
  name: purchase-service
  namespace: default
  labels:
    app: purchase-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: purchase-service
  template:
    metadata:
      labels:
        app: purchase-service
    spec:
      containers:
        - name: purchase-service
          image: ghcr.io/sentimentalk/francais_tout_en_un/purchase_service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_PORT
              value: "8003"
            - name: DATABASE_URL
              value: "postgresql://postgres:1@one-database:5432/onedb"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: MESSAGING_BACKEND
              value: "redis"
          ports:
            - containerPort: 8003
              name: httpport
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
      nodeSelector:
        kubernetes.io/arch: arm64

---
apiVersion: v1
kind: Service
metadata:
  name: purchase-service
  namespace: default
  labels:
    app: purchase-service
spec:
  ports:
    - port: 8003
      targetPort: 8003
      protocol: TCP
      name: http
  selector:
    app: purchase-service
  type: ClusterIP
