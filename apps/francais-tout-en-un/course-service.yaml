apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
  namespace: default
  labels:
    app: course-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: course-service
  template:
    metadata:
      labels:
        app: course-service
    spec:
      containers:
        - name: course-service
          image: ghcr.io/sentimentalk/francais_tout_en_un/course_service:latest
          imagePullPolicy: IfNotPresent
          environment:
            - name: SERVICE_PORT
              value: "8001"
            - name: DATABASE_URL
              value: "postgresql://postgres:1@one-database:5432/onedb"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 8001
              name: httpport
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
      nodeSelector:
        kubernetes.io/arch: arm64

---
apiVersion: v1
kind: Service
metadata:
  name: course-service
  namespace: default
  labels:
    app: course-service
spec:
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: http
  selector:
    app: course-service
  type: ClusterIP
