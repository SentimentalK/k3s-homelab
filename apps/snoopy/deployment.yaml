apiVersion: apps/v1
kind: Deployment
metadata:
  name: snoopy
  labels:
    app: snoopy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snoopy
  template:
    metadata:
      labels:
        app: snoopy
    spec:
      containers:
        - name: snoopy
          image: ghcr.io/sentimentalk/snoopy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
      # Target the specific AMD64 node mtl1
      nodeSelector:
        kubernetes.io/arch: amd64
        kubernetes.io/hostname: mtl1
